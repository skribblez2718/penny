name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions — read-only access to contents
permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: oven-sh/setup-bun@4bc047ad26d0f1a5e0ea8f6a334a1b1a8a88e5b3  # v2.0.1
        with:
          bun-version: latest

      - uses: astral-sh/setup-uv@d4a4e3c3e3e3e3e3e3e3e3e3e3e3e3e3e3e3e3  # v5.4.2
        with:
          version: "latest"

      - name: Install dependencies
        run: make setup

      - name: Lint
        run: make lint

      - name: Test
        run: make test
