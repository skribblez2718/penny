# Secret scanning exclusions — these directories contain fake/example secrets
# used for testing semgrep detection rules and JSA vulnerability detection.
# None of these are real credentials.

paths-ignore:
  # Semgrep rules — all test fixtures contain fake/example secrets for detection testing
  - ".pi/extensions/semgrep/rules/**"
  # JSA vulnerability test fixtures (intentionally vulnerable example app)
  - ".pi/skills/jsa/tests/fixtures/**"
