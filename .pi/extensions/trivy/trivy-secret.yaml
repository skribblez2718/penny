# trivy-secret.yaml — bundled secret-scanner config for the trivy Pi extension.
#
# Authored for the sca skill's tool-extension layer (Phase 4a). Our own tuned
# config, not vendored. Referenced by trivy.yaml's `secret.config` and passed
# explicitly via --secret-config by index.ts. See:
#   https://trivy.dev/latest/docs/scanner/secret/
#
# Trivy's maintained (builtin) secret detectors are ENABLED BY DEFAULT — there
# is NO `enable-builtin-rules` key in trivy 0.72.0's secret-config schema. An
# earlier version of this file set `enable-builtin-rules: true`, which caused a
# FATAL "cannot unmarshal !!bool `true` into []string" and a total scan failure
# (Batch F.2 REAL-VERIFIED against trivy 0.72.0). This allow-rules-only config
# makes real trivy 0.72.0 exit rc=0 with a clean JSON scan; the builtin
# detectors remain active without any explicit enable field.

allow-rules:
  - id: skip-node-modules
    description: Ignore vendored JS dependencies
    path: (^|/)node_modules/
  - id: skip-test-fixtures
    description: Ignore test/secret fixtures
    path: (^|/).*test.*fixtures?/
