[pytest]
# Pytest configuration for the sca skill test suite.
#
# Auto-discovered by pytest. Complements conftest.py by declaring testpaths,
# default output options, and strict marker behavior (unknown markers = error).

# Where to find tests
testpaths = tests

# Default command-line options. Override on the command line as needed.
addopts =
    -ra
    --strict-markers
    --tb=short

# Registered markers (mirrors jsa). Fast-lane tests use none of these; they
# exist so slow/integration/network/e2e/requires_* tests can be selected or
# deselected without triggering --strict-markers errors.
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests that exercise the full pipeline
    network: marks tests that require network access
    e2e: marks end-to-end tests that exercise the full skill lifecycle
    requires_semgrep: tests that need the semgrep binary on PATH
    requires_scanner: tests that need an external SAST/SCA scanner on PATH
    requires_llm: tests that need a live LLM/provider
