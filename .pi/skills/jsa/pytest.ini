[pytest]
# Pytest configuration for the jsa skill test suite.
#
# This file is auto-discovered by pytest. It complements conftest.py by:
# - Declaring testpaths so `pytest` from the project root finds these tests
# - Setting default options for output and warnings
# - Marking strict marker behavior (unknown markers = error)

# Where to find tests
testpaths = tests

# Default command-line options. Override on the command line as needed.
addopts =
    -ra
    --strict-markers
    --tb=short

# Filter noisy warnings that don't indicate real problems
filterwarnings =
    ignore::DeprecationWarning:tree_sitter.*
    ignore::DeprecationWarning:splitter.*
