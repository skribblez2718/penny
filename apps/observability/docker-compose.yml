services:
  observability:
    build:
      context: ../..
      dockerfile: apps/observability/Dockerfile
    ports:
      - "8765:8765"
    volumes:
      - observability-data:/data
      - ${PWD}/.env:/app/.env:ro
    environment:
      - PI_OBSERVABILITY_DATA_DIR=/data
      - PI_OBSERVABILITY_HOST=0.0.0.0
      - PI_OBSERVABILITY_PORT=8765
    restart: unless-stopped

volumes:
  observability-data:
